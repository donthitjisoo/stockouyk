name: Update financial data and deploy

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "data/fundamentals/**"
      - "scripts/**"
      - "package.json"
      - "package-lock.json"
      - "vite.config.ts"
      - "tsconfig*.json"
      - ".github/workflows/update-data.yml"
      - "watchlist.json"
  schedule:
    - cron: "*/5 1-6 * * 1-5"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: github-pages-financial-data
  cancel-in-progress: false

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Generate static financial JSON
        run: npm run update:data
      - run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ vars.VITE_SUPABASE_ANON_KEY }}
      - name: Sync build for branch-based GitHub Pages
        run: |
          cp dist/index.html index.html
          rm -rf assets
          mkdir -p assets data
          cp -R dist/assets/* assets/
          cp dist/data/*.json data/
      - name: Commit generated data and branch Pages build
        run: |
          if git diff --quiet public/data data/*.json quotes.json index.html assets; then
            echo "No generated changes."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add public/data data/*.json quotes.json index.html assets
            git commit -m "Update generated financial site"
            git push
          fi
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - uses: actions/deploy-pages@v4
